<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nailicious.no - Send spørsmål</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="logo">
        <a href="/">
            <img src="/static/images/Nailicous.svg" alt="Nailicous logo">
        </a>  
    </div>
    
    <div class="subtitle">
        <h1>Send inn spørsmål</h1>
    </div>

    <div class="booking">
        <form method="POST">
            Spørsmål:
            <input type="text" name="sporsmal" required><br><br>

            <button type="submit">Send inn</button>
        </form>

        <p><a class="back-link" href="/faq">Tilbake til FAQ</a></p>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

</body>
</html>
